<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Model Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #eee; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }

    #toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    #toolbar h1 { font-size: 15px; font-weight: 600; color: #e2e8f0; margin-right: 8px; }

    .model-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .model-btn:hover { background: #1e4080; color: #e2e8f0; }
    .model-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

    #hint {
      margin-left: auto;
      font-size: 12px;
      color: #475569;
    }

    #canvas-wrap { flex: 1; position: relative; }
    canvas { display: block; width: 100% !important; height: 100% !important; }

    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(26,26,46,0.85);
      font-size: 14px; color: #94a3b8;
      gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #0f3460;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading.hidden { display: none; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>3D Viewer</h1>
  <button class="model-btn active" data-file="Exp 3D-Modells/3D_Modell Brandenburg.glb">Brandenburg</button>
  <button class="model-btn" data-file="Exp 3D-Modells/3D_Modell Hamburg.glb">Hamburg</button>
  <button class="model-btn" data-file="Exp 3D-Modells/3D_Modell North Germany.glb">North Germany</button>
  <button class="model-btn" data-file="Exp 3D-Modells/3D_Modell Ruhr.glb">Ruhr</button>
  <span id="hint">Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Right-drag to pan</span>
</div>

<div id="canvas-wrap">
  <div id="loading"><div class="spinner"></div><span>Loading model…</span></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const wrap = document.getElementById('canvas-wrap');
const loading = document.getElementById('loading');

// --- Renderer ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
wrap.appendChild(renderer.domElement);

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
// fog is set dynamically after model loads

// --- Camera ---
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
camera.position.set(0, 10, 30);

// --- Controls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 0.5;
controls.maxDistance = 500;

// --- Lights ---
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff4e0, 2.5);
sun.position.set(20, 40, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 300;
sun.shadow.camera.left = -60;
sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60;
sun.shadow.camera.bottom = -60;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xc9d8ff, 0.8);
fill.position.set(-20, 10, -20);
scene.add(fill);

// --- Resize ---
function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(wrap);
resize();

// --- Load model ---
const draco = new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/libs/draco/');
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);
let currentModel = null;

function loadModel(path) {
  loading.classList.remove('hidden');
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        mats.forEach(m => m.dispose());
      }
    });
    currentModel = null;
  }

  loader.load(path,
    (gltf) => {
      const model = gltf.scene;

      // Enable shadows on all meshes
      model.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });

      // Fit camera to model
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * (Math.PI / 180);
      const dist = Math.abs(maxDim / Math.sin(fov / 2)) * 0.7;

      model.position.sub(center);
      scene.add(model);
      currentModel = model;

      camera.position.set(0, dist * 0.5, dist);
      controls.target.set(0, 0, 0);
      controls.minDistance = maxDim * 0.05;
      controls.maxDistance = maxDim * 10;
      controls.update();

      // Scale fog to model size
      scene.fog = new THREE.Fog(0x1a1a2e, dist * 1.5, dist * 4);

      // Update shadow camera frustum
      sun.shadow.camera.left = -maxDim;
      sun.shadow.camera.right = maxDim;
      sun.shadow.camera.top = maxDim;
      sun.shadow.camera.bottom = -maxDim;
      sun.shadow.camera.far = dist * 4;
      sun.shadow.camera.updateProjectionMatrix();

      loading.classList.add('hidden');
    },
    (xhr) => {
      const pct = Math.round((xhr.loaded / xhr.total) * 100);
      loading.querySelector('span').textContent = `Loading model… ${pct}%`;
    },
    (err) => {
      loading.querySelector('span').textContent = `Error loading model: ${err.message}`;
    }
  );
}

// --- Buttons ---
document.querySelectorAll('.model-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadModel(btn.dataset.file);
  });
});

// Expose for debugging
window.dbg = { scene, camera, controls, renderer, THREE };

// --- Render loop ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// Load first model on start
loadModel('Exp 3D-Modells/3D_Modell Brandenburg.glb');
</script>
</body>
</html>
